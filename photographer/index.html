<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>撮影者画面</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="view-container">
      <section id="capturePanel" class="panel capture-panel">
        <section class="camera-container">
          <div class="camera-stage">
            <video id="video" autoplay playsinline muted></video>
            <img id="guide" alt="撮影ガイド" hidden />
            <div class="button-area camera-overlay">
              <button id="captureBtn" class="capture-btn" aria-label="撮影"></button>
              <span id="photoCount" class="photo-count">0枚</span>
            </div>
          </div>

          <div class="top-bar">
            <div class="status">接続準備中</div>
            <button id="toggleGuideBtn" class="action-btn guide-control" hidden>ガイドON/OFF</button>
          </div>
        </section>

        <section class="controls">
          <div id="supportPanel" class="support-panel" aria-live="polite" hidden>
            <div class="support-label">撮影サポート</div>
            <div id="supportMessage" class="support-message"></div>
          </div>

          <div id="experimentStatus" class="experiment-status" hidden></div>

          <label class="slider-area guide-control" hidden>
            ガイド透過度
            <input
              id="opacitySlider"
              type="range"
              min="0"
              max="1"
              step="0.1"
              value="0.5"
            />
          </label>

          <div class="action-buttons">
            <button id="shareLiveBtn" class="action-btn send-btn">ライブ共有</button>
            <button id="sendBtn" class="action-btn send-btn">送信</button>
            <button id="clearBtn" class="action-btn clear-btn">クリア</button>
            <button id="deleteSessionBtn" class="action-btn danger-btn">削除</button>
          </div>

          <button id="viewGalleryBtn" class="action-btn secondary-btn">撮影済み写真はありません</button>

          <div id="errorPanel" class="error-panel" role="alert" hidden></div>
        </section>
      </section>

      <section id="galleryPanel" class="panel gallery-panel" hidden aria-modal="true" role="dialog">
        <div class="gallery-header">
          <div>
            <div class="gallery-title">写真一覧</div>
            <div id="gallerySummary" class="gallery-summary">撮影済み写真 0枚</div>
          </div>
          <button id="closeGalleryBtn" type="button" class="action-btn secondary-btn">閉じる</button>
        </div>

        <div class="gallery-content">
          <div id="galleryEmptyMessage" class="gallery-empty" hidden>
            まだ撮影済みの写真はありません。撮影画面で写真を撮ってください。
          </div>

          <section
            id="thumbnailContainer"
            class="thumbnail-container"
            aria-label="撮影した写真一覧"
            hidden
          ></section>
        </div>
      </section>
    </div>

    <div id="photoPreviewOverlay" class="photo-preview-overlay" hidden>
      <button id="closePreviewBtn" class="preview-close" type="button" aria-label="写真プレビューを閉じる">×</button>
      <img id="previewImage" alt="写真プレビュー" />
    </div>

    <canvas id="canvas"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
